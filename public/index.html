<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <!-- Basic App Identity -->
    <title>Andys Gym</title>
    <meta name="description" content="Andys Gym – 4 Week Training Dashboard" />

    <!-- Fav Icon (browser tab) -->
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />

    <!-- iPhone / iPad full-screen “installed app” behavior -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />

    <!-- Theme color (used by browsers + some install surfaces) -->
    <meta name="theme-color" content="#000000" />

    <!-- Safe-area support for iPhone notch + responsive layout -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />

    <!-- Apple Home Screen icon -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/icon.png" />

    <!-- PWA manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
  </head>

  <body>
    <noscript>You need to enable JavaScript to run Andys Gym.</noscript>
    <div id="root"></div>
  </body>
</html>
